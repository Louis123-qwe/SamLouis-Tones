<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace — Music Club</title>
  <link rel="stylesheet" href="main.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-functions-compat.js"></script>
  <style>
    .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .market-card { background: white; border-radius: var(--r-xl); overflow: hidden; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); transition: all var(--t-normal); }
    .market-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .market-thumb { height: 140px; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
    .market-body { padding: 18px; }
    .market-title { font-weight: 700; font-size: 0.9375rem; margin-bottom: 6px; }
    .market-price { font-size: 1.125rem; font-weight: 800; color: var(--azure); }
  </style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div style="text-align:center"><div style="font-size:2.5rem;margin-bottom:12px">🎵</div><div class="spinner" style="width:28px;height:28px;margin:0 auto"></div></div></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-mark"><div class="logo-icon">🎵</div><div class="logo-text">SamLouis<span> Tones</span></div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Main</div>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="courses.html" class="nav-item"><span class="nav-icon">📚</span> My Courses</a>
        <a href="marketplace.html" class="nav-item active"><span class="nav-icon">🎼</span> Marketplace</a>
        <a href="leaderboard.html" class="nav-item"><span class="nav-icon">🏆</span> Leaderboard</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Account</div>
        <a href="subscription.html" class="nav-item"><span class="nav-icon">💎</span> Subscription</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="avatar avatar-sm" id="sidebarAvatar">?</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarName">Loading...</div></div></div>
      <button class="nav-item" onclick="handleLogout()" style="width:100%;margin-top:4px"><span class="nav-icon">🚪</span> Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger btn btn-ghost btn-icon" onclick="toggleSidebar()">☰</button>
        <h2 style="font-size:1.125rem;font-weight:700">🎼 Marketplace</h2>
      </div>
    </header>
    <div class="page-content">
      <div class="mb-24">
        <h1 class="t-h2">Musical Scores & Scripts</h1>
        <p class="t-secondary t-sm mt-4">Download professional scores and performance scripts</p>
      </div>
      <div id="marketGrid" class="market-grid stagger-children">
        <div class="card animate-pulse" style="height:240px"></div>
        <div class="card animate-pulse" style="height:240px"></div>
        <div class="card animate-pulse" style="height:240px"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div class="modal-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

<script type="module">
  import { AuthService } from './auth.js';
  import { UserService, MarketplaceService } from './db.js';
  import { ADMIN_WHATSAPP } from './config.js';

  let currentUser, currentProfile, unlockedItems;

  async function init() {
    currentUser = await AuthService.requireAuth('../index.html');
    [currentProfile, unlockedItems] = await Promise.all([
      UserService.get(currentUser.uid),
      MarketplaceService.getUserUnlocked(currentUser.uid)
    ]);
    document.getElementById('pageLoader').classList.add('hidden');
    
    const name = currentProfile.displayName || 'User';
    const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('sidebarAvatar').textContent = initials;
    document.getElementById('sidebarName').textContent = name;
    
    loadMarketplace();
  }

  async function loadMarketplace() {
    const items = await MarketplaceService.getAll();
    const grid = document.getElementById('marketGrid');
    
    if (!items.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎼</div><div class="empty-title">No items yet</div></div>`;
      return;
    }

    grid.innerHTML = items.map(item => {
      // Access check
      const isUnlocked = unlockedItems.includes(item.id) || 
                         item.requiredPlan === 'free' || 
                         item.access === 'free';

      // Use uploaded thumbnail or fallback to emoji
      const thumbnailContent = item.thumbnailUrl 
        ? `<img src="${item.thumbnailUrl}" style="width:100%; height:100%; object-fit:cover;">`
        : item.icon || '🎵';

      // Force download URL
      // This replaces 'image/upload' with 'auto/upload' AND adds the attachment flag
const downloadUrl = item.fileUrl 
  ? item.fileUrl.replace('/image/upload/', '/auto/upload/fl_attachment/') 
  : '#';


      return `
        <div class="market-card">
          <div class="market-thumb">${thumbnailContent}</div>
          <div class="market-body">
            <div class="market-title">${item.title}</div>
            <div style="font-size:0.8125rem; color:var(--text-secondary); margin-bottom:12px; height:40px; overflow:hidden;">
              ${item.description || ''}
            </div>
            <div style="display:flex; align-items:center; justify-content:between;">
              <span class="market-price">
                ${!item.price || item.price === 0 ? 'Free' : `₦${Number(item.price).toLocaleString()}`}
              </span>
              
              ${isUnlocked
                ? `<a href="${downloadUrl}" download="${item.title}" target="_blank" class="btn btn-primary btn-sm">⬇ Download</a>`
                : `<button class="btn btn-orange btn-sm" onclick="requestItem('${item.id}','${item.title}','${item.price}')">🔒 Unlock</button>`
              }
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.requestItem = (id, title, price) => {
    const msg = encodeURIComponent(`Hello! I'd like to unlock "${title}" (₦${price}) on Music Club. My account: ${currentProfile.email}`);
    window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${msg}`, '_blank');
    showToast('Opening WhatsApp to request access...', 'info');
  };

  window.toggleSidebar = () => {
    document.getElementById('sidebar').classList.toggle('mobile-open');
    document.getElementById('mobileOverlay').classList.toggle('open');
  };

  window.handleLogout = () => AuthService.logout();

  window.showToast = (msg, type='info') => {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 4000);
  };

  init();
  <script>
</body>
</html>
