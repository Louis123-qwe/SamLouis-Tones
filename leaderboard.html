<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — Music Club</title>
  <link rel="stylesheet" href="main.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-functions-compat.js"></script>
</head>
<body>
<div class="page-loader" id="pageLoader"><div style="text-align:center"><div style="font-size:2.5rem;margin-bottom:12px">🎵</div><div class="spinner" style="width:28px;height:28px;margin:0 auto"></div></div></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-mark"><div class="logo-icon">🎵</div><div class="logo-text">SamLouis<span> Tones</span></div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="courses.html" class="nav-item"><span class="nav-icon">📚</span> Courses</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">🎼</span> Marketplace</a>
        <a href="leaderboard.html" class="nav-item active"><span class="nav-icon">🏆</span> Leaderboard</a>
      </div>
      <div class="nav-section">
        <a href="subscription.html" class="nav-item"><span class="nav-icon">💎</span> Subscription</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="avatar avatar-sm" id="sidebarAvatar">?</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarName">Loading...</div></div></div>
      <button class="nav-item" onclick="handleLogout()" style="width:100%;margin-top:4px"><span class="nav-icon">🚪</span> Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger btn btn-ghost btn-icon" onclick="toggleSidebar()">☰</button>
        <h2 style="font-size:1.125rem;font-weight:700">🏆 Leaderboard</h2>
      </div>
    </header>
    <div class="page-content">
      <!-- Top 3 podium -->
      <div id="podium" style="display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:32px;flex-wrap:wrap"></div>

      <!-- Full leaderboard -->
      <div class="card" style="border-radius:var(--r-xl);overflow:hidden">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <h3 class="t-h3">Global Rankings</h3>
          <span class="t-xs t-muted" id="updateTime">Updating...</span>
        </div>
        <div id="leaderboardList" style="padding:8px 0">
          <div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-sub">Loading...</div></div>
        </div>
      </div>

      <!-- My rank card -->
      <div id="myRankCard" class="card mt-24" style="border-radius:var(--r-xl);background:linear-gradient(135deg,var(--azure),var(--deep-blue));color:white;display:none">
        <div class="flex items-center gap-16">
          <div style="font-size:2.5rem">🎯</div>
          <div>
            <div style="font-size:0.875rem;opacity:0.7">Your Ranking</div>
            <div style="font-size:1.5rem;font-weight:800" id="myRankNum">#—</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:0.875rem;opacity:0.7">Points</div>
            <div style="font-size:1.5rem;font-weight:800" id="myPoints">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

<script type="module">
  import { AuthService } from './auth.js';
  import { UserService, LeaderboardService } from './db.js';

  let currentUser, currentProfile;

  async function init() {
    currentUser = await AuthService.requireAuth('../index.html');
    currentProfile = await UserService.get(currentUser.uid);
    document.getElementById('pageLoader').classList.add('hidden');
    const initials = (currentProfile.displayName||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('sidebarAvatar').textContent = initials;
    document.getElementById('sidebarName').textContent = currentProfile.displayName || '';
    loadLeaderboard();
  }

  async function loadLeaderboard() {
    const top = await LeaderboardService.getTop(50);
    document.getElementById('updateTime').textContent = 'Updated just now';

    // Podium (top 3)
    const podiumEl = document.getElementById('podium');
    if (top.length >= 3) {
      const podiumOrder = [top[1], top[0], top[2]]; // 2nd, 1st, 3rd
      const heights = ['140px', '180px', '110px'];
      const medals = ['🥈', '🥇', '🥉'];
      const colors = ['#9CA3AF', '#F59E0B', '#CD7C2F'];
      podiumEl.innerHTML = podiumOrder.map((u, i) => `
        <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px">
          <div style="font-size:1.5rem">${medals[i]}</div>
          <div class="avatar avatar-md">${(u.displayName||'?')[0].toUpperCase()}</div>
          <div style="font-size:0.8125rem;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.displayName || 'User'}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${u.points?.toLocaleString()} pts</div>
          <div style="width:80px;background:${colors[i]};border-radius:8px 8px 0 0;height:${heights[i]};display:flex;align-items:flex-start;justify-content:center;padding-top:10px;color:white;font-weight:800;font-size:1.25rem">#${u.rank}</div>
        </div>
      `).join('');
    }

    // Full list
    const listEl = document.getElementById('leaderboardList');
    if (!top.length) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-title">No rankings yet</div><div class="empty-sub">Complete lessons and quizzes to appear on the leaderboard!</div></div>`;
      return;
    }

    listEl.innerHTML = top.map(u => {
      const isMe = u.userId === currentUser.uid;
      const rankClass = u.rank === 1 ? 'gold' : u.rank === 2 ? 'silver' : u.rank === 3 ? 'bronze' : '';
      return `
        <div class="leaderboard-row ${isMe ? 'style="background:rgba(43,127,255,0.05)"' : ''}">
          <div class="lb-rank ${rankClass}">${u.rank <= 3 ? ['🥇','🥈','🥉'][u.rank-1] : u.rank}</div>
          <div class="avatar avatar-sm">${(u.displayName||'?')[0].toUpperCase()}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:0.875rem">${u.displayName || 'User'}${isMe ? ' <span style="color:var(--azure);font-size:0.75rem">(You)</span>' : ''}</div>
          </div>
          <div class="lb-points">${(u.points||0).toLocaleString()} <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted)">pts</span></div>
        </div>
      `;
    }).join('');

    // My rank
    const myEntry = top.find(u => u.userId === currentUser.uid);
    if (myEntry) {
      document.getElementById('myRankCard').style.display = 'block';
      document.getElementById('myRankNum').textContent = `#${myEntry.rank}`;
      document.getElementById('myPoints').textContent = (myEntry.points||0).toLocaleString();
    }
  }

  window.toggleSidebar = () => {
    document.getElementById('sidebar').classList.toggle('mobile-open');
    document.getElementById('mobileOverlay').classList.toggle('open');
  };
  window.handleLogout = () => AuthService.logout();
  init();
</script>
</body>
</html>
